name: Build LagrangeCodec Dynamic Library

on:
  workflow_dispatch:
  push:
    branches:
      - '*'

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchains
        uses: MinoruSekine/setup-scoop@v4.0.1
        with:
          apps: ninja

      - uses: ilammy/msvc-dev-cmd@v1
      - name: Build LagrangeCodec
        run: |
          $env:VCPKG_ROOT = "C:\vcpkg"
          $env:PATH = "$env:VCPKG_ROOT;$env:PATH"
          cmake -DCMAKE_BUILD_TYPE=Release --preset msvc-x64-windows-static-release -S . -B build
          cd build && ninja && ls

      - name: Run Tests
        run: |
          cd build && ctest -C Release -V --no-compress-output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LagrangeCodec.x64.dll
          path: build/LagrangeCodec.dll

  build-windows-x86:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchains
        uses: MinoruSekine/setup-scoop@v4.0.1
        with:
          apps: ninja

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build LagrangeCodec
        run: |
          $env:VCPKG_ROOT = "C:\vcpkg"
          $env:PATH = "$env:VCPKG_ROOT;$env:PATH"
          cmake -DCMAKE_BUILD_TYPE=Release --preset msvc-x86-windows-static-release -S . -B build
          cmake --build build

      - name: Run Tests
        run: |
          cd build && ctest -C Release -V --no-compress-output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LagrangeCodec.x86.dll
          path: build/LagrangeCodec.dll

  build-linux-amd64:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchains
        run: |
          sudo apt-get update && sudo apt install build-essential cmake ninja-build nasm -y

      - name: Build LagrangeCodec
        run: |
          export VCPKG_ROOT="/usr/local/share/vcpkg"
          export PATH="$VCPKG_ROOT:$PATH"
          cmake -DCMAKE_BUILD_TYPE=Release --preset gcc-x64-linux-static-release -S . -B build
          cmake --build build

      - name: Run Tests
        run: |
          cd build && ctest -C Release -V --no-compress-output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libLagrangeCodec.x64.so
          path: build/libLagrangeCodec.so

  build-linux-aarch64:
    runs-on: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchains
        run: |
          sudo apt-get update && sudo apt install build-essential cmake ninja-build nasm -y

      - name: Build LagrangeCodec
        run: |
          export VCPKG_ROOT="/usr/local/share/vcpkg"
          export PATH="$VCPKG_ROOT:$PATH"
          cmake -DCMAKE_BUILD_TYPE=Release --preset gcc-arm64-linux-static-release -S . -B build
          cmake --build build

      - name: Run Tests
        run: |
          cd build && ctest -C Release -V --no-compress-output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libLagrangeCodec.arm64.so
          path: build/libLagrangeCodec.so

  build-android-arm64:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchains
        run: |
          sudo apt-get update && sudo apt install build-essential cmake ninja-build nasm -y

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Build LagrangeCodec
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -o pipefail
          mkdir -p build
          export VCPKG_ROOT="/usr/local/share/vcpkg"
          export PATH="$VCPKG_ROOT:$PATH"
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF --preset clang-arm64-android-static-release -S . -B build 2>&1 | tee build/android-configure.log
          cmake --build build 2>&1 | tee build/android-build.log

      - name: Dump Android build logs on failure
        if: failure()
        run: |
          test -f build/android-configure.log && tail -n 200 build/android-configure.log || true
          test -f build/android-build.log && tail -n 200 build/android-build.log || true
          test -f build/vcpkg-manifest-install.log && tail -n 300 build/vcpkg-manifest-install.log || true
          find /usr/local/share/vcpkg/buildtrees/ffmpeg -type f \( -name "*.log" -o -path "*/ffbuild/config.log" \) -print -exec tail -n 300 {} \; || true
          if [ -f build/android-configure.log ]; then
            CFG_TAIL=$(tail -n 40 build/android-configure.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=android configure log::$CFG_TAIL"
          fi
          if [ -f build/android-build.log ]; then
            BUILD_MAIN_TAIL=$(tail -n 40 build/android-build.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=android build log::$BUILD_MAIN_TAIL"
            sed -n '/^FAILED:/,$p' build/android-build.log | tail -n 120 > build/android-build-errors.log || true
            if [ -s build/android-build-errors.log ]; then
              split -l 20 -d -a 2 build/android-build-errors.log build/android-build-errors-part-
              for part in build/android-build-errors-part-*; do
                PART_CONTENT=$(sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g' "$part")
                echo "::error title=android build errors $(basename "$part")::$PART_CONTENT"
              done
            fi
          fi
          if [ -f /usr/local/share/vcpkg/buildtrees/ffmpeg/arm64-android-rel/ffbuild/config.log ]; then
            CONFIG_TAIL=$(tail -n 40 /usr/local/share/vcpkg/buildtrees/ffmpeg/arm64-android-rel/ffbuild/config.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=ffmpeg arm64 android config.log::$CONFIG_TAIL"
          fi
          if [ -f /usr/local/share/vcpkg/buildtrees/ffmpeg/build-arm64-android-rel-out.log ]; then
            BUILD_TAIL=$(tail -n 40 /usr/local/share/vcpkg/buildtrees/ffmpeg/build-arm64-android-rel-out.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=ffmpeg arm64 android build log::$BUILD_TAIL"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libLagrangeCodec.android.arm64.so
          path: build/libLagrangeCodec.so

  build-macos-amd64:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchains
        run: |
          softwareupdate --install-rosetta --agree-to-license
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          arch -x86_64 /usr/local/bin/brew install cmake make nasm ninja
          arch -x86_64 /usr/local/bin/brew link --overwrite make
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg && arch -x86_64 /bin/bash ./bootstrap-vcpkg.sh

      - name: Build LagrangeCodec
        run: |
          export VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg
          export PATH=$VCPKG_ROOT:$PATH
          arch -x86_64 /usr/local/bin/cmake --preset clang-x64-osx-static-release -S . -B build
          cd build && arch -x86_64 /usr/local/bin/ninja

      - name: Run Tests
        run: |
          cd build && arch -x86_64 /usr/local/bin/ctest -C Release -V --no-compress-output


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libLagrangeCodec.x64.dylib
          path: build/libLagrangeCodec.dylib

  build-macos-aarch64:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchains
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg && ./bootstrap-vcpkg.sh
          brew install cmake ninja nasm

      - name: Build LagrangeCodec
        run: |
          export VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg
          export PATH=$VCPKG_ROOT:$PATH
          cmake -DCMAKE_BUILD_TYPE=Release --preset clang-arm64-osx-static-release -S . -B build
          cmake --build build

      - name: Run Tests
        run: |
          cd build && ctest -C Release -V --no-compress-output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libLagrangeCodec.arm64.dylib
          path: build/libLagrangeCodec.dylib
