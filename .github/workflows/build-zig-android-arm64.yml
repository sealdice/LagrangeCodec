name: Build Zig Android arm64

on:
  workflow_dispatch:
  push:
    branches:
      - zig-android-arm64-clean

jobs:
  build-zig-android-arm64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchains
        run: |
          sudo apt-get update && sudo apt install build-essential cmake ninja-build nasm curl python3 -y

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build Zig Android deps
        id: build_zig_deps
        continue-on-error: true
        run: |
          set -euo pipefail
          FFMPEG_ZIG_DIR="$RUNNER_TEMP/ffmpeg-zig"
          PREFIX_DIR="$GITHUB_WORKSPACE/build-zig-android-deps/prefix"
          rm -rf "$FFMPEG_ZIG_DIR" "$PREFIX_DIR"
          git clone --depth 1 --branch 7.0.1-5 https://github.com/allyourcodebase/ffmpeg.git "$FFMPEG_ZIG_DIR"
          cd "$FFMPEG_ZIG_DIR"
          zig build -Dtarget=aarch64-linux-android -Doptimize=ReleaseFast -p "$PREFIX_DIR" 2>&1 | tee "$GITHUB_WORKSPACE/build-zig-android-deps.log"

      - name: Summarize Zig deps log
        if: always()
        run: |
          set -euo pipefail
          {
            echo '## Build Zig Android deps'
            if [ -f build-zig-android-deps.log ]; then
              echo ''
              echo '### First 120 lines'
              echo '```text'
              sed -n '1,120p' build-zig-android-deps.log
              echo '```'
              echo ''
              echo '### Last 120 lines'
              echo '```text'
              tail -n 120 build-zig-android-deps.log
              echo '```'
            else
              echo 'No build-zig-android-deps.log was produced.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Zig deps log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zig-android-deps-log
          path: build-zig-android-deps.log

      - name: Stop if Zig deps failed
        if: steps.build_zig_deps.outcome == 'failure'
        run: |
          echo "Build Zig Android deps failed"
          exit 1

      - name: Prepare Zig compiler wrappers
        run: |
          set -euo pipefail
          WRAPPER_DIR="$RUNNER_TEMP/zig-android-bin"
          AR_BIN="$(command -v llvm-ar || command -v ar)"
          RANLIB_BIN="$(command -v llvm-ranlib || command -v ranlib)"
          mkdir -p "$WRAPPER_DIR"
          printf '%s\n' '#!/usr/bin/env bash' 'exec zig cc -target aarch64-linux-android -D__ANDROID_API__=21 -lc "$@"' > "$WRAPPER_DIR/zig-cc"
          printf '%s\n' '#!/usr/bin/env bash' 'exec zig c++ -target aarch64-linux-android -D__ANDROID_API__=21 -lc "$@"' > "$WRAPPER_DIR/zig-cxx"
          chmod +x "$WRAPPER_DIR/zig-cc" "$WRAPPER_DIR/zig-cxx"
          echo "WRAPPER_DIR=$WRAPPER_DIR" >> "$GITHUB_ENV"
          echo "AR_BIN=$AR_BIN" >> "$GITHUB_ENV"
          echo "RANLIB_BIN=$RANLIB_BIN" >> "$GITHUB_ENV"

      - name: Build LagrangeCodec Zig Android static bundle
        run: |
          set -euo pipefail
          PREFIX_DIR="$GITHUB_WORKSPACE/build-zig-android-deps/prefix"
          cmake -G Ninja \
            -S . \
            -B build-zig-android \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_C_COMPILER="$WRAPPER_DIR/zig-cc" \
            -DCMAKE_CXX_COMPILER="$WRAPPER_DIR/zig-cxx" \
            -DCMAKE_AR="$AR_BIN" \
            -DCMAKE_RANLIB="$RANLIB_BIN" \
            -DBUILD_TESTING=OFF \
            -DLAGRANGECODEC_BUILD_SHARED=OFF \
            -DLAGRANGECODEC_BUILD_ANDROID_RUNTIME_SMOKE=ON \
            -DLAGRANGECODEC_NATIVE_PREFIX="$PREFIX_DIR"
          cmake --build build-zig-android

      - name: Stage bundle
        run: |
          set -euo pipefail
          chmod +x scripts/stage_zig_android_bundle.sh
          bash scripts/stage_zig_android_bundle.sh build-zig-android build-zig-android-deps/prefix bundle/zig-androidArm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LagrangeCodec.zig.android.arm64
          path: bundle/zig-androidArm64/
