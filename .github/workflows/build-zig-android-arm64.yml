name: Build Zig Android arm64

on:
  workflow_dispatch:
  push:
    branches:
      - zig-android-arm64-clean

env:
  ZIG_VERSION: 0.14.1
  FFMPEG_ANDROID_TAG: v7.1-beta.16
  FFMPEG_ANDROID_ASSET: ffmpeg_android_aarch64_tiny.tar.gz

jobs:
  build-zig-android-arm64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchains
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build curl python3 llvm file

      - name: Setup Zig
        run: |
          set -euo pipefail
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          ZIG_DIR="$RUNNER_TEMP/zig"
          rm -rf "$ZIG_DIR"
          mkdir -p "$ZIG_DIR"
          curl -L --fail "$ZIG_URL" -o "$RUNNER_TEMP/zig.tar.xz"
          tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$ZIG_DIR" --strip-components=1
          echo "$ZIG_DIR" >> "$GITHUB_PATH"
          echo "ZIG_BIN=$ZIG_DIR/zig" >> "$GITHUB_ENV"
          "$ZIG_DIR/zig" version

      - name: Download prebuilt FFmpeg
        run: |
          set -euo pipefail
          PREFIX_DIR="$GITHUB_WORKSPACE/build-zig-android-deps/prefix"
          EXTRACT_DIR="$GITHUB_WORKSPACE/build-zig-android-deps/extract"
          ASSET_URL="https://github.com/yearsyan/ffmpeg-android-build/releases/download/${FFMPEG_ANDROID_TAG}/${FFMPEG_ANDROID_ASSET}"
          rm -rf "$PREFIX_DIR" "$EXTRACT_DIR"
          mkdir -p "$PREFIX_DIR" "$EXTRACT_DIR"
          curl -L --fail --retry 5 --retry-all-errors "$ASSET_URL" -o "$RUNNER_TEMP/${FFMPEG_ANDROID_ASSET}"
          tar -xzf "$RUNNER_TEMP/${FFMPEG_ANDROID_ASSET}" -C "$EXTRACT_DIR"
          ROOT_DIR="$(find "$EXTRACT_DIR" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -n "$ROOT_DIR"
          cp -a "$ROOT_DIR"/. "$PREFIX_DIR"/
          find "$PREFIX_DIR/lib" -maxdepth 1 -name '*.a' -printf '%f\n' | sort

      - name: Verify prebuilt FFmpeg archives
        run: |
          set -euo pipefail
          PREFIX_DIR="$GITHUB_WORKSPACE/build-zig-android-deps/prefix"
          REQUIRED_LIBS=(libavformat.a libavcodec.a libswresample.a libswscale.a libavutil.a)
          for name in "${REQUIRED_LIBS[@]}"; do
            test -f "$PREFIX_DIR/lib/$name"
          done

          NM_BIN="$(command -v llvm-nm || command -v nm)"
          bad=0
          for name in "${REQUIRED_LIBS[@]}"; do
            lib="$PREFIX_DIR/lib/$name"
            undefined="$($NM_BIN -u "$lib" 2>/dev/null || true)"

            if printf '%s\n' "$undefined" | grep -E '(__read_chk|__vsnprintf_chk|__write_chk|(^|[^[:alnum:]_])stderr([^[:alnum:]_]|$))' >/dev/null; then
              echo "Forbidden host/glibc symbol found in $name"
              printf '%s\n' "$undefined" | grep -E '(__read_chk|__vsnprintf_chk|__write_chk|(^|[^[:alnum:]_])stderr([^[:alnum:]_]|$))' || true
              bad=1
            fi

            if printf '%s\n' "$undefined" | grep -E '(^|[^[:alnum:]_])(lame_|dav1d_|aom_)' >/dev/null; then
              echo "Unexpected external codec dependency found in $name"
              printf '%s\n' "$undefined" | grep -E '(^|[^[:alnum:]_])(lame_|dav1d_|aom_)' || true
              bad=1
            fi
          done

          if [ "$bad" -ne 0 ]; then
            exit 1
          fi

          echo "Using FFmpeg package ${FFMPEG_ANDROID_ASSET} from ${FFMPEG_ANDROID_TAG}"

      - name: Prepare Zig compiler wrappers
        run: |
          set -euo pipefail
          WRAPPER_DIR="$RUNNER_TEMP/zig-android-bin"
          AR_BIN="$(command -v llvm-ar || command -v ar)"
          RANLIB_BIN="$(command -v llvm-ranlib || command -v ranlib)"
          rm -rf "$WRAPPER_DIR"
          mkdir -p "$WRAPPER_DIR"
          printf '%s\n' '#!/usr/bin/env bash' 'exec zig cc -target aarch64-linux-android -D__ANDROID_API__=21 "$@"' > "$WRAPPER_DIR/zig-cc"
          printf '%s\n' '#!/usr/bin/env bash' 'exec zig c++ -target aarch64-linux-android -D__ANDROID_API__=21 "$@"' > "$WRAPPER_DIR/zig-cxx"
          chmod +x "$WRAPPER_DIR/zig-cc" "$WRAPPER_DIR/zig-cxx"
          echo "WRAPPER_DIR=$WRAPPER_DIR" >> "$GITHUB_ENV"
          echo "AR_BIN=$AR_BIN" >> "$GITHUB_ENV"
          echo "RANLIB_BIN=$RANLIB_BIN" >> "$GITHUB_ENV"

      - name: Build LagrangeCodec Zig Android static bundle
        run: |
          set -euo pipefail
          PREFIX_DIR="$GITHUB_WORKSPACE/build-zig-android-deps/prefix"
          cmake -G Ninja \
            -S . \
            -B build-zig-android \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_C_COMPILER="$WRAPPER_DIR/zig-cc" \
            -DCMAKE_C_COMPILER_TARGET=aarch64-linux-android \
            -DCMAKE_CXX_COMPILER="$WRAPPER_DIR/zig-cxx" \
            -DCMAKE_CXX_COMPILER_TARGET=aarch64-linux-android \
            -DCMAKE_AR="$AR_BIN" \
            -DCMAKE_RANLIB="$RANLIB_BIN" \
            -DBUILD_TESTING=OFF \
            -DLAGRANGECODEC_BUILD_SHARED=OFF \
            -DLAGRANGECODEC_BUILD_ANDROID_RUNTIME_SMOKE=ON \
            -DLAGRANGECODEC_NATIVE_PREFIX="$PREFIX_DIR"
          cmake --build build-zig-android --verbose

      - name: Verify Android smoke binary
        run: |
          set -euo pipefail
          BIN="build-zig-android/android_runtime_smoke"
          test -f "$BIN"
          file "$BIN"
          readelf -h "$BIN" | sed -n '1,20p'
          NM_BIN="$(command -v llvm-nm || command -v nm)"
          if "$NM_BIN" -u "$BIN" 2>/dev/null | grep -E '(__read_chk|__vsnprintf_chk|__write_chk|(^|[^[:alnum:]_])stderr([^[:alnum:]_]|$))' >/dev/null; then
            echo "Forbidden host/glibc symbol leaked into android_runtime_smoke"
            "$NM_BIN" -u "$BIN" 2>/dev/null | grep -E '(__read_chk|__vsnprintf_chk|__write_chk|(^|[^[:alnum:]_])stderr([^[:alnum:]_]|$))' || true
            exit 1
          fi

      - name: Stage bundle
        run: |
          set -euo pipefail
          chmod +x scripts/stage_zig_android_bundle.sh
          bash scripts/stage_zig_android_bundle.sh build-zig-android build-zig-android-deps/prefix bundle/zig-androidArm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LagrangeCodec.zig.android.arm64
          path: bundle/zig-androidArm64/
